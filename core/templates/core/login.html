{% extends "core/base.html" %}

{% block title %}Login{% endblock %}

{% block content %}
<div class="max-w-md mx-auto bg-white shadow rounded-lg p-6">
    <h1 class="text-2xl font-semibold mb-4">Login</h1>

    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit"
                class="bg-brand text-white px-4 py-2 rounded text-sm hover:bg-brand-dark">
            Login
        </button>
    </form>
</div>
{% endblock %}
